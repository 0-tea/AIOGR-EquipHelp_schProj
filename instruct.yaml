SAFETY_PRECAUTIONS: |
  Подготовка:
  1. Убедитесь, что все необходимое оборудование исправно. 
  2. Обеспечьте рабочую зону. Уберите посторонние  легковоспламеняющиеся предметы, жидкости, еду.
  3. Наденьте защитную одежду. Уберите волосы, снимите украшения, закрепите свободные рукава.
  
  Процесс работы:
  1. Строго соблюдайте указания преподователя или инструкции от производителя оборудования.
  2. Защита. Не снимайте штатные средства защиты (кожухи, экраны, блокировки).
  3. Работать с оборудованием с чистыми руками.
  
  Завершение и ЧП:
  1. Полностью отключите оборудование от сети, дождитесь остановки движущихся частей. Приведите в порядок рабочее место.
  2. При любой неполадке (шум, искры, дым, запах) немедленно обесточьте технику и сообщите преподователю.
  3. Узнайте заранее, где находятся аптечка и огнетушитель.
  

rezak_derevo_xTooL_P2_suggest_other: |
  Использование лазерной точки для моделирования выполнения задания без реза.
  
  Как использовать красную указку для примерки
  Если в станке есть красная точка (лазер-указка), её можно включить при отключенном питании основного лазера. Запустите файл — точка покажет, где пройдет луч, не прожигая материал.
  Нюансы:
   • Для векторных линий — работает отлично, точка обводит контур.
   • Для растровой гравировки — бесполезно, так как луч мечется по всей площади.
  Как примерить гравировку:
  Чтобы увидеть границы будущей растровой заливки, добавьте в файл вспомогательные векторные элементы:
   • Обводящий квадрат/круг по краю гравировки.
   • Или крест из горизонтальной и вертикальной линий через центр.
  Запустите примерку с красной точкой по этим линиям — поймете, где будет зона гравировки.

rezak_derevo_xTooL_P2_suggest_gravirovka: |
  Совет № 6: Расфокусировка лазерного луча для получения более толстых векторных линий.
  
  Как сделать толстые линии при векторной обработке (быстро, но без реза)
  Чтобы линии были толще, чем сфокусированный луч, нужно вывести материал из фокуса.
  Технология:
      1. Положите на заготовку толстый предмет (например, брусок 9–10 мм).
      2. Сфокусируйте лазер на этом бруске.
      3. Уберите брусок и запустите векторный режим с малой мощностью и высокой скоростью (как в прошлом совете). Луч рассеется и даст широкую линию.
  Минусы метода (важно знать):
   • Линия получается менее четкой и точной, чем при растровой гравировке.
   • В углах лазер замедляется, поэтому они прогорают сильнее (появляются заметные точки).
   

rezak_derevo_xTooL_P2_suggest_graphicEdit: |
  Добавление векторной обводки к краю шрифта или гравируемого изображения
  
  Как сделать края гравировки четче
  Если края изображения кажутся размытыми, добавьте по периметру тонкую векторную обводку.
  Как это сделать:
      1. Возьмите векторный файл.
      2. Добавьте тонкий контур (обводку) по краю рисунка.
      3. Настройте лазер на малую мощность и высокую скорость, чтобы он слегка обжег край, но не прорезал материал.
  После основной гравировки лазер дополнительно пройдет по контуру, делая границы четкими. Это особенно хорошо работает для текста и надписей.


rezak_derevo_xTooL_P2: |
  Создание первой программы в Tool Creative Space!
  
  Для работы с лазерным гравером Tool P2 используется фирменное приложение Tool Creative Space. Это основная программа для подготовки макетов и управления устройством.
  1. Установка и подключение
   • Скачайте Tool Creative Space с официального сайта производителя (раздел "Поддержка" или "Скачать").
   • Установите на компьютер (доступны версии для Windows и macOS).
   • Подключите гравер к компьютеру через USB-кабель или по Wi-Fi (следуйте инструкции по сопряжению в приложении).
  2. Создание нового проекта
   • Запустите Tool Creative Space.
   • На стартовом экране нажмите "Новый проект" (New Project).
   • Выберите ориентацию и размер рабочего поля (по умолчанию установится под модель Tool P2).
  3. Подготовка изображения или текста
   • Для гравировки картинки: нажмите "Импорт" (Import) и выберите файл изображения (поддерживаются .png, .jpg, .bmp, .svg). Разместите изображение в рабочей области.
   • Для создания надписи: нажмите "Текст" (Text). Введите текст, выберите шрифт и размер. При необходимости преобразуйте текст в кривые (кнопка "Convert to Path"), чтобы избежать проблем со шрифтами.
   • Для простой фигуры: используйте инструменты "Прямоугольник", "Круг" или "Линия" на панели слева.
  4. Настройка параметров обработки
   • Выделите созданный объект.
   • В правой панели (Параметры слоя) выберите тип обработки:
   ◦ Гравировка (Raster): для фотографий и заливок.
   ◦ Резка (Vector): для контуров и сквозной резки.
   • Задайте материал: в выпадающем списке выберите, например, "Дерево 3 мм" (программа автоматически предложит рекомендуемую мощность и скорость). Можно настроить вручную:
   ◦ Мощность (Power): для первой пробы на дереве установите ~30–40%.
   ◦ Скорость (Speed): для гравировки ~2000–3000 мм/мин.
   • Убедитесь, что в нижней панели отображается примерное время работы.
  5. Предварительный просмотр
   • Нажмите кнопку "Предпросмотр" (Preview) или "Симуляция" (значок глаза). Программа покажет, как лазер будет двигаться и какие области будут обработаны.
  6. Отправка на гравер
   • Убедитесь, что гравер включен и подключен.
   • Разместите заготовку в рабочей зоне и выполните фокусировку (согласно инструкции к станку, обычно с помощью калибровочной подставки).
   • В приложении нажмите "Выполнить" (Run) или "Отправить на устройство".
   • Подтвердите начало работы. Гравер выполнит прожиг границ (если включена эта опция), затем приступит к гравировке.
  7. Завершение
   • Дождитесь окончания процесса.
   • Извлеките заготовку. При необходимости удалите пыль и нагар.